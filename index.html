<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Transun reachability — Jakarta</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0e1420;
    --ink-2: #2a3242;
    --mute: #6b7588;
    --mute-2: #98a1b3;
    --hair: #e6e9ef;
    --hair-2: #eef1f6;
    --bg: #f6f7fa;
    --card: #ffffff;
    --accent: #10b981;
    --accent-ink: #065f46;
    --accent-soft: #d8f3e5;
    --accent-dark: #047857;
    --shadow-lg: 0 10px 30px -10px rgba(14,20,32,.18), 0 2px 6px rgba(14,20,32,.05);
    --shadow-sm: 0 1px 2px rgba(14,20,32,.06), 0 2px 8px rgba(14,20,32,.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.005em;
  }

  /* Layout shell */
  .shell {
    position: relative; width: 100%; height: 100vh; min-height: 720px;
    overflow: hidden; background: #e9edf2;
  }
  #krl-map { position: absolute; inset: 0; background: #eef2f6; }

  /* Subtle vignette around the map edges */
  .vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 390;
    box-shadow: inset 0 0 140px rgba(14,20,32,.08);
  }

  /* Top toolbar */
  .toolbar-wrap {
    position: absolute; top: 20px; left: 20px; right: 20px; z-index: 500;
    display: flex; justify-content: center; pointer-events: none;
  }
  .toolbar {
    pointer-events: auto;
    background: rgba(255,255,255,.96);
    backdrop-filter: saturate(140%) blur(8px);
    -webkit-backdrop-filter: saturate(140%) blur(8px);
    border: 1px solid rgba(14,20,32,.06);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    padding: 14px 18px 12px;
    width: min(1040px, 100%);
    display: grid;
    grid-template-columns: auto 1fr auto;
    column-gap: 18px;
    align-items: center;
  }

  .brand {
    display: flex; align-items: center; gap: 10px;
    padding-right: 16px; border-right: 1px solid var(--hair);
    height: 100%;
  }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--ink);
    display: grid; place-items: center; color: #fff;
    box-shadow: inset 0 -3px 0 rgba(255,255,255,.08);
  }
  .brand-name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; line-height: 1; }
  .brand-sub { font-size: 11px; color: var(--mute); margin-top: 3px; }

  /* Mode toggle */
  .mode-toggle {
    display: inline-flex; align-items: center; gap: 2px;
    background: var(--panel-2); border-radius: 999px; padding: 3px;
    margin: 0 auto 8px; width: fit-content;
  }
  .mode-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent; border: none; color: var(--mute);
    padding: 6px 14px; border-radius: 999px; cursor: pointer;
    font-family: inherit; font-size: 12px; font-weight: 600;
    transition: background .18s, color .18s;
  }
  .mode-btn:hover { color: var(--ink); }
  .mode-btn.active { background: var(--ink); color: #fff; box-shadow: 0 1px 2px rgba(14,20,32,.18); }

  /* Middle column: question + scrubber */
  .center-col { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  .question {
    font-size: 14px; color: var(--ink-2); font-weight: 500;
    text-align: center; line-height: 1.3;
  }
  .question .origin-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent-soft); color: var(--accent-dark);
    padding: 2px 9px; border-radius: 999px; font-weight: 600;
    margin-left: 4px;
  }
  .question .origin-pill::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 3px rgba(16,185,129,.2);
  }

  .scrubber {
    position: relative; padding: 6px 8px 0;
  }
  #time-slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 6px; background: transparent;
    margin: 0; cursor: pointer;
  }
  #time-slider::-webkit-slider-runnable-track {
    height: 6px; border-radius: 999px;
    background: linear-gradient(to right,
      var(--accent) 0%, var(--accent) var(--pct,14%),
      var(--hair) var(--pct,14%), var(--hair) 100%);
  }
  #time-slider::-moz-range-track { height: 6px; background: var(--hair); border-radius: 999px; }
  #time-slider::-moz-range-progress { height: 6px; background: var(--accent); border-radius: 999px; }
  #time-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 40px; height: 24px; margin-top: -9px;
    background: #fff;
    border: 2px solid var(--accent);
    border-radius: 999px;
    box-shadow: 0 1px 4px rgba(6,95,70,.25), 0 3px 8px rgba(6,95,70,.15);
    cursor: grab;
    position: relative;
  }
  #time-slider::-webkit-slider-thumb:hover { border-color: var(--accent-dark); }
  #time-slider::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(0.97); }
  #time-slider::-moz-range-thumb {
    width: 36px; height: 22px; background: #fff;
    border: 2px solid var(--accent); border-radius: 999px; cursor: grab;
  }

  .thumb-icon {
    position: absolute; top: 0; pointer-events: none;
    width: 40px; height: 24px; display: grid; place-items: center;
    transform: translateX(-50%);
    color: var(--accent-dark);
  }

  .ticks {
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10.5px; color: var(--mute-2);
    padding: 8px 2px 0; letter-spacing: 0.02em;
  }
  .ticks span { position: relative; text-align: center; }
  .ticks span::before {
    content: ""; position: absolute; top: -6px; left: 50%;
    width: 1px; height: 4px; background: var(--hair);
    transform: translateX(-50%);
  }

  .time-chip {
    position: absolute; top: -30px;
    background: var(--ink); color: #fff;
    padding: 4px 10px; border-radius: 999px;
    font-size: 11.5px; font-weight: 600; letter-spacing: 0.01em;
    pointer-events: none; transform: translateX(-50%);
    white-space: nowrap; box-shadow: 0 4px 12px rgba(14,20,32,.25);
    font-variant-numeric: tabular-nums;
    transition: opacity .15s;
  }
  .time-chip::after {
    content: ""; position: absolute; bottom: -4px; left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 7px; height: 7px; background: var(--ink);
  }

  /* Right column: controls */
  .ctl-group {
    display: flex; align-items: center; gap: 8px;
    padding-left: 16px; border-left: 1px solid var(--hair);
    height: 100%;
  }
  .ctl-btn {
    width: 40px; height: 40px; border-radius: 11px;
    background: var(--ink); color: #fff; border: none;
    cursor: pointer; display: grid; place-items: center;
    transition: background .15s, transform .1s;
    flex-shrink: 0;
  }
  .ctl-btn:hover { background: var(--ink-2); }
  .ctl-btn:active { transform: scale(0.96); }
  .ctl-btn.active { background: var(--accent); }
  .ctl-btn.ghost {
    background: var(--card); color: var(--ink-2);
    border: 1px solid var(--hair);
  }
  .ctl-btn.ghost:hover { background: var(--hair-2); }

  /* Search */
  .search-wrap {
    position: relative;
    display: flex; align-items: center;
    background: var(--card);
    border: 1px solid var(--hair);
    border-radius: 11px;
    height: 40px; padding: 0 10px 0 34px;
    width: 220px; transition: all .15s;
  }
  .search-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(16,185,129,.14);
  }
  .search-wrap svg { position: absolute; left: 12px; color: var(--mute); }
  #search-input {
    border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 13px; color: var(--ink);
    width: 100%; height: 100%;
  }
  #search-input::placeholder { color: var(--mute); }

  #search-results {
    display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--card); border: 1px solid var(--hair);
    border-radius: 12px; max-height: 320px; overflow-y: auto;
    z-index: 600; box-shadow: var(--shadow-lg);
    padding: 4px;
  }
  .search-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; gap: 10px;
    font-size: 13px; border-radius: 8px; cursor: pointer;
  }
  .search-row:hover, .search-row.active { background: var(--hair-2); }
  .search-row .stn-name { font-weight: 500; color: var(--ink); }
  .search-row .meta-r { display: flex; align-items: center; gap: 8px; }
  .search-row .lines-label {
    font-size: 10.5px; color: var(--mute);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }
  .search-row .line-dots { display: flex; gap: 3px; }
  .search-row .line-dots span { width: 7px; height: 7px; border-radius: 50%; }
  .search-row mark { background: #fef3c7; color: var(--ink); padding: 0 2px; border-radius: 3px; }

  /* Stats strip */
  .stats {
    position: absolute; left: 20px; bottom: 20px; z-index: 500;
    background: rgba(255,255,255,.97);
    backdrop-filter: saturate(140%) blur(8px);
    border: 1px solid rgba(14,20,32,.06);
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    padding: 14px 16px;
    width: 240px;
  }
  .stats-title {
    font-size: 10.5px; font-weight: 600; color: var(--mute);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .stat-row {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 6px 0; border-top: 1px solid var(--hair-2);
  }
  .stat-row:first-of-type { border-top: none; padding-top: 0; }
  .stat-row .label { font-size: 12px; color: var(--mute); }
  .stat-row .value {
    font-size: 20px; font-weight: 600; color: var(--ink);
    font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
  }
  .stat-row .value small { font-size: 11px; font-weight: 500; color: var(--mute); margin-left: 3px; }

  .stat-block { padding: 8px 0; border-top: 1px solid var(--hair-2); }
  .stat-block:first-of-type { border-top: none; padding-top: 0; }
  .stat-block .stat-label { font-size: 11px; color: var(--mute); margin-bottom: 5px; }
  .stat-block .stat-numbers {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 6px;
  }
  .stat-block .stat-main {
    font-size: 20px; font-weight: 700;
    font-variant-numeric: tabular-nums; letter-spacing: -0.02em; line-height: 1;
    transition: color .2s;
  }
  .stat-block .stat-main small {
    font-size: 11px; font-weight: 500; margin-left: 2px;
    transition: color .2s;
  }
  .stat-block .stat-sub {
    font-size: 11px; font-weight: 500;
    font-variant-numeric: tabular-nums;
    transition: color .2s;
  }

  /* colour themes: only the big number changes color */
  .stat-theme-green .stat-main   { color: var(--accent); }
  .stat-theme-green .stat-main small { color: var(--mute); }
  .stat-theme-green .stat-sub    { color: var(--mute); }
  .stat-theme-orange .stat-main  { color: #f97316; }
  .stat-theme-orange .stat-main small { color: var(--mute); }
  .stat-theme-orange .stat-sub   { color: var(--mute); }

  /* bar stack — two bars that hug each other */
  .bar-stack { display: flex; flex-direction: column; gap: 2px; }

  /* green bar: always visible */
  .bar-track-green {
    height: 5px; background: var(--hair-2); border-radius: 999px;
    overflow: hidden; position: relative;
    flex-shrink: 0;
  }

  /* orange bar: collapses to blank space in transun mode, expands in car mode */
  .bar-track-orange {
    height: 0; background: var(--hair-2); border-radius: 999px;
    overflow: hidden; position: relative;
    flex-shrink: 0;
    transition: height .22s ease, margin-top .22s ease;
    margin-top: 0;
  }
  .bar-track-orange.visible {
    height: 5px;
    margin-top: 0;
  }

  .bar-fill {
    height: 100%; border-radius: 999px;
    transition: width .28s ease;
    position: absolute; left: 0; top: 0;
  }
  .bar-fill.green  { background: var(--accent); }
  .bar-fill.orange { background: #f97316; }

  /* Vertical radius slider */
  .radius-ctl {
    position: absolute; right: 20px; top: 50%; z-index: 500;
    transform: translateY(-50%);
    background: rgba(255,255,255,.97);
    backdrop-filter: saturate(140%) blur(8px);
    border: 1px solid rgba(14,20,32,.06);
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    padding: 14px 10px 12px;
    width: 74px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .radius-title {
    font-size: 9.5px; font-weight: 600; color: var(--mute);
    letter-spacing: 0.08em; text-transform: uppercase; text-align: center;
  }
  .radius-val {
    font-size: 18px; font-weight: 700; color: var(--ink);
    font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
    display: flex; align-items: baseline; gap: 2px;
  }
  .radius-val small { font-size: 10px; font-weight: 500; color: var(--mute); }
  .radius-track {
    position: relative; width: 28px; height: 180px;
    display: grid; place-items: center;
  }
  #radius-slider {
    -webkit-appearance: slider-vertical; appearance: slider-vertical;
    writing-mode: bt-lr;
    width: 6px; height: 180px;
    background: transparent; margin: 0; cursor: pointer;
    accent-color: var(--accent);
  }
  .radius-scale {
    display: flex; flex-direction: column; justify-content: space-between;
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    height: 170px; font-size: 9px; color: var(--mute-2);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    pointer-events: none;
  }

  /* Legend */
  .legend {
    position: absolute; right: 20px; bottom: 20px; z-index: 500;
    background: rgba(255,255,255,.97);
    backdrop-filter: saturate(140%) blur(8px);
    border: 1px solid rgba(14,20,32,.06);
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    padding: 12px 14px;
  }
  .legend-title {
    font-size: 10.5px; font-weight: 600; color: var(--mute);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .legend-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink-2); padding: 3px 0;
  }
  .legend-swatch { width: 14px; display: grid; place-items: center; flex-shrink: 0; }
  .legend .dot-origin { width: 11px; height: 11px; border-radius: 50%; background: #fff; border: 2.5px solid var(--ink); }
  .legend .dot-terminus { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid #fff; box-shadow: 0 0 0 1.5px var(--accent); }
  .legend .dot-interchange { width: 10px; height: 10px; border-radius: 50%; background: transparent; border: 1.5px solid var(--accent); box-shadow: inset 0 0 0 2px #fff; }
  .legend .blob-swatch { width: 16px; height: 10px; border-radius: 999px; background: rgba(16,185,129,.2); border: 1.5px solid var(--accent); }

  /* Station dots */
  .stn-marker { background: transparent !important; border: none !important; }
  .stn-dot { border-radius: 50%; }
  .stn-dot.interchange {
    width: 10px; height: 10px;
    background: #fff; border: 1.5px solid var(--accent);
    box-shadow: 0 1px 2px rgba(14,20,32,.15);
    position: relative;
  }
  .stn-dot.interchange::after { display: none; }
  .stn-dot.terminus {
    width: 10px; height: 10px;
    background: var(--accent); border: 2px solid #fff;
    box-shadow: 0 0 0 1.5px var(--accent), 0 1px 4px rgba(14,20,32,.20);
  }
  .stn-dot.origin {
    width: 16px; height: 16px;
    background: #fff; border: 3px solid var(--ink);
    box-shadow: 0 2px 6px rgba(14,20,32,.3), 0 0 0 4px rgba(16,185,129,.18);
  }
  .stn-dot.reachable-small {
    width: 6px; height: 6px;
    background: #059669; opacity: 0.75;
    box-shadow: 0 0 0 1.5px rgba(255,255,255,0.8);
  }
  .stn-dot.unreached-small {
    width: 5px; height: 5px;
    background: #c5cdd6;
    box-shadow: 0 0 0 1.5px #fff;
  }
  .stn-dot.hidden-hit {
    width: 22px; height: 22px; background: transparent; border: none; cursor: pointer;
  }

  .stn-label {
    background: transparent !important; border: none !important;
    font-size: 11px; font-weight: 500; color: var(--ink);
    text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, -1.5px 1.5px 0 #fff, 1.5px 1.5px 0 #fff,
                 0 -1.5px 0 #fff, 0 1.5px 0 #fff, -1.5px 0 0 #fff, 1.5px 0 0 #fff;
    white-space: nowrap; pointer-events: none;
    letter-spacing: -0.005em;
  }
  .stn-label.origin { font-size: 14px; font-weight: 700; color: var(--ink); }
  .stn-label.terminus { font-size: 11.5px; font-weight: 600; color: var(--accent-dark); }

  /* Landmarks */
  .landmark-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #fff; border: 2px solid var(--accent);
    box-shadow: 0 1px 3px rgba(6,95,70,.3);
  }
  .landmark-label {
    background: transparent !important; border: none !important;
    font-size: 10px; font-weight: 500; color: var(--accent-dark);
    text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, -1.5px 1.5px 0 #fff, 1.5px 1.5px 0 #fff,
                 0 -1.5px 0 #fff, 0 1.5px 0 #fff, -1.5px 0 0 #fff, 1.5px 0 0 #fff;
    white-space: nowrap; pointer-events: none;
  }

  /* Popup */
  .stn-popup .leaflet-popup-content-wrapper {
    border-radius: 14px; padding: 0; overflow: hidden;
    box-shadow: 0 12px 32px rgba(14,20,32,.18), 0 2px 8px rgba(14,20,32,.06);
    border: 1px solid rgba(14,20,32,.05);
  }
  .stn-popup .leaflet-popup-content {
    margin: 0; padding: 0; width: 264px !important;
    font-family: 'Inter', sans-serif;
  }
  .stn-popup .leaflet-popup-tip { box-shadow: 0 6px 16px rgba(14,20,32,.15); }
  .stn-popup .leaflet-popup-close-button {
    color: var(--mute); font-size: 18px; padding: 6px 8px 0 0 !important;
  }

  .popup-header {
    padding: 14px 16px 12px;
    background: linear-gradient(135deg, #fdfdfd 0%, #f6f7fa 100%);
    border-bottom: 1px solid var(--hair-2);
  }
  .popup-title {
    font-size: 15px; font-weight: 600; color: var(--ink);
    margin: 0 0 4px; letter-spacing: -0.01em;
  }
  .popup-sub {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--mute); font-weight: 500;
  }
  .popup-sub .line-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px; border-radius: 999px; font-size: 10px; font-weight: 600;
    color: #fff; letter-spacing: 0.01em;
  }
  .popup-travel {
    display: flex; align-items: center; gap: 8px;
    margin-top: 10px; padding: 8px 10px;
    background: #fff; border: 1px solid var(--hair-2);
    border-radius: 10px; font-size: 12px;
  }
  .popup-travel .t-lbl { color: var(--mute); }
  .popup-travel .t-val { font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; }

  .set-origin-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; margin-top: 10px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 10px; padding: 9px 12px;
    font-size: 12.5px; font-weight: 600; cursor: pointer;
    font-family: inherit;
    transition: background .15s, transform .1s;
  }
  .set-origin-btn:hover { background: var(--accent-dark); }
  .set-origin-btn:active { transform: scale(0.99); }
  .origin-badge {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 10px; background: var(--accent-soft); color: var(--accent-dark);
    border-radius: 10px; padding: 8px 12px;
    font-size: 12px; font-weight: 600;
  }

  .section-label {
    padding: 10px 16px 4px; font-size: 10px; color: var(--mute);
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .popup-list { padding: 0 6px 10px; }
  .popup-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; border-radius: 8px; gap: 10px;
  }
  .popup-item:hover { background: var(--hair-2); }
  .popup-item .l {
    display: flex; align-items: center; gap: 9px; min-width: 0;
  }
  .popup-item .l-icon {
    width: 26px; height: 26px; flex-shrink: 0; border-radius: 8px;
    display: grid; place-items: center;
    background: var(--accent-soft); color: var(--accent-dark);
  }
  .popup-item .l-text { min-width: 0; }
  .popup-item .name {
    font-size: 12.5px; font-weight: 500; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: block; max-width: 160px;
  }
  .popup-item .type {
    font-size: 10.5px; color: var(--mute); margin-top: 1px;
  }
  .popup-item .meta {

<script>
(function(){
  if (!window.KRL_STATIONS || !window.KRL_EDGES || !window.KRL_LINES || !window.KRL_LANDMARKS) {
    document.getElementById('krl-map').innerHTML =
      '<div style="padding:20px;font-family:sans-serif;color:#b00;">' +
      'Data files failed to load.</div>';
    return;
  }
  const STATIONS = window.KRL_STATIONS;
  const EDGES = window.KRL_EDGES;
  const LINE_NAMES = window.KRL_LINES.names;
  const LINE_COLORS = window.KRL_LINES.colors;
  const TRANSFER_PENALTY = window.KRL_LINES.transferPenalty;
  const LANDMARKS = window.KRL_LANDMARKS;

  // ---- Graph ----
  const adj = {};
  Object.keys(STATIONS).forEach(s => adj[s] = []);
  EDGES.forEach(([a,b,line,min]) => {
    adj[a].push({to: b, line, minutes: min});
    adj[b].push({to: a, line, minutes: min});
  });
  const allStations = Object.keys(STATIONS);
  const N = allStations.length;

  function computeTimes(origin) {
    const dist = {};
    allStations.forEach(s => dist[s] = Infinity);
    dist[origin] = 0;
    const pq = [{s: origin, line: null, t: 0}];
    while (pq.length) {
      pq.sort((a,b) => a.t - b.t);
      const {s, line, t} = pq.shift();
      if (t > dist[s] + TRANSFER_PENALTY) continue;
      for (const edge of adj[s]) {
        const isTransfer = (line !== null && line !== edge.line);
        const nt = t + edge.minutes + (isTransfer ? TRANSFER_PENALTY : 0);
        if (nt < dist[edge.to]) {
          dist[edge.to] = nt;
          pq.push({s: edge.to, line: edge.line, t: nt});
        }
      }
    }
    return dist;
  }
  function fmtTime(m) {
    if (m < 60) return `${m} min`;
    const h = Math.floor(m/60), mm = m%60;
    return mm === 0 ? `${h}h` : `${h}h ${String(mm).padStart(2,'0')}`;
  }
  // For each line, find the two extreme reachable stations (the two ends of the
  // reachable segment on that line). We pick the reachable station with the
  // smallest and largest along-line index.
  const lineOrder = {}; // line -> [station,...] in sequence order
  (function buildLineOrder(){
    Object.keys(LINE_NAMES).forEach(line => {
      const stns = allStations.filter(n => STATIONS[n].lines.includes(line));
      const lineAdj = {};
      stns.forEach(s => lineAdj[s] = []);
      EDGES.forEach(([a,b,l]) => {
        if (l !== line) return;
        if (lineAdj[a]) lineAdj[a].push(b);
        if (lineAdj[b]) lineAdj[b].push(a);
      });
      // find an endpoint (degree 1) if any; else start anywhere
      let start = stns.find(s => lineAdj[s].length <= 1) || stns[0];
      const order = [], seen = new Set();
      let cur = start, prev = null;
      while (cur && !seen.has(cur)) {
        order.push(cur); seen.add(cur);
        const next = (lineAdj[cur] || []).find(n => n !== prev && !seen.has(n));
        prev = cur; cur = next;
      }
      // add any stragglers (branches)
      stns.forEach(s => { if (!seen.has(s)) order.push(s); });
      lineOrder[line] = order;
    });
  })();

  // A station is "furthest reachable" if in the reachable subgraph it has
  // exactly one reachable neighbour — a topological dead-end.
  function findTermini(dist, budget, origin) {
    const reachableSet = new Set(
      allStations.filter(n => n === origin || (isFinite(dist[n]) && dist[n] <= budget))
    );
    const termini = new Set();
    reachableSet.forEach(name => {
      if (name === origin) return;
      const reachableNeighbours = adj[name].filter(e => reachableSet.has(e.to));
      if (reachableNeighbours.length === 1) termini.add(name);
    });
    return termini;
  }

  // ---- Map ----
  const map = L.map('krl-map', {
    center: [-6.28, 106.82], zoom: 11,
    zoomControl: true, attributionControl: true
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 18
  }).addTo(map);

  map.zoomControl.setPosition('topright');

  const blobLayer = L.layerGroup().addTo(map);
  const edgeLayer = L.layerGroup().addTo(map);
  // Pane for small/unreached station dots — sits BELOW the gradient canvas
  // so non-reachable stations don't stand out on top of the blob.
  map.createPane('lowStations');
  map.getPane('lowStations').style.zIndex = 380;
  map.getPane('lowStations').style.pointerEvents = 'auto';
  map.createPane('highStations');
  map.getPane('highStations').style.zIndex = 610;
  map.getPane('highStations').style.pointerEvents = 'auto';
  const landmarkLayer = L.layerGroup().addTo(map);
  const stationLayer = L.layerGroup().addTo(map);
  const labelLayer = L.layerGroup().addTo(map);

  // Build edges with line colors (subtle when not reached)
  const edgeLines = [];
  EDGES.forEach(([a,b,line]) => {
    const sa = STATIONS[a], sb = STATIONS[b];
    // shadow layer (wider, soft)
    const shadow = L.polyline([[sa.lat, sa.lng], [sb.lat, sb.lng]], {
      color: '#cdd4de', weight: 3, opacity: 0.55, interactive: false, lineCap: 'round'
    }).addTo(edgeLayer);
    const poly = L.polyline([[sa.lat, sa.lng], [sb.lat, sb.lng]], {
      color: '#b6bcc8', weight: 1.5, opacity: 0.9, interactive: false, lineCap: 'round'
    }).addTo(edgeLayer);
    edgeLines.push({ a, b, line, poly, shadow });
  });

  const markerInfo = {};
  const stationMarkers = {};
  let highMarkers = {};
  const labelMarkers = {};

  // ---- Popup rendering ----
  const LM_ICONS = {
    Cafe:    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 10h14v4a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4v-4Z"/><path d="M17 11h2a2 2 0 0 1 0 4h-2"/><path d="M7 4v2M11 3v3M15 4v2"/></svg>',
    Eatery:  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 3v8a3 3 0 0 0 6 0V3M7 3v18"/><path d="M17 14v7M15 3c-1.5 1.5-2 3.5-2 5 0 2 1 3.5 4 3.5"/></svg>',
    Park:    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 3l6 10H6l6-10Z"/><path d="M12 13v8"/></svg>',
    Square:  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>',
    School:  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 10l9-5 9 5-9 5-9-5Z"/><path d="M7 12v5c3 2 7 2 10 0v-5"/></svg>',
    Shop:    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 8h16l-1 11H5L4 8Z"/><path d="M8 8V6a4 4 0 0 1 8 0v2"/></svg>',
    Market:  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 8h18l-2 5H5L3 8Z"/><path d="M5 13v7h14v-7"/></svg>',
    Clinic:  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 6v12M6 12h12"/></svg>',
    Mosque:  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 20V12a8 8 0 0 1 16 0v8"/><path d="M4 20h16M12 4v4"/></svg>'
  };

  function renderPopup(name) {
    const s = STATIONS[name];
    const lms = LANDMARKS[name] || [];
    const isOrigin = (name === origin);
    const travelMin = currentDist[name];
    const lineChips = s.lines.map(l =>
      `<span class="line-chip" style="background:${LINE_COLORS[l]}">${LINE_NAMES[l]}</span>`
    ).join('');

    const travelHtml = isOrigin
      ? `<div class="popup-travel"><span class="t-lbl">This is your origin</span></div>`
      : (isFinite(travelMin)
          ? `<div class="popup-travel">
               <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6b7588" stroke-width="2" stroke-linecap="round">
                 <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
               </svg>
               <span class="t-lbl">From ${origin}</span>
               <span class="t-val" style="margin-left:auto;">${fmtTime(travelMin)}</span>
             </div>`
          : `<div class="popup-travel"><span class="t-lbl">Not reachable yet</span></div>`);

    const setBtn = isOrigin
      ? `<div class="origin-badge">
           <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 12l5 5L20 6"/></svg>
           Current origin
         </div>`
      : `<button class="set-origin-btn" data-setorigin="${name.replace(/"/g,'&quot;')}">
           <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 3v18M3 12h18"/></svg>
           Set as origin
         </button>`;

    const itemsHtml = lms.map(lm => `
      <div class="popup-item">
        <div class="l">
          <div class="l-icon">${LM_ICONS[lm.type] || LM_ICONS.Square}</div>
          <div class="l-text">
            <span class="name">${lm.name}</span>
            <div class="type">${lm.type}</div>
          </div>
        </div>
        <div class="meta"><b>${lm.walk_min} min</b>${lm.meters} m</div>
      </div>`).join('');

    return `
      <div class="popup-header">
        <div class="popup-title">${name}</div>
        <div class="popup-sub">${lineChips}</div>
        ${travelHtml}
        ${setBtn}
      </div>
      <div class="section-label">Within walking distance</div>
      <div class="popup-list">${itemsHtml}</div>`;
  }

  Object.entries(STATIONS).forEach(([name, s]) => {
    const marker = L.marker([s.lat, s.lng], {
      pane: 'lowStations',
      icon: L.divIcon({
        className: 'stn-marker',
        html: '<div class="stn-dot hidden-hit"></div>',
        iconSize: [22, 22], iconAnchor: [11, 11]
      })
    });
    marker.bindPopup('', {
      className: 'stn-popup', closeButton: true, offset: [0, -4],
      autoPan: true, maxWidth: 264, minWidth: 264
    });
    marker.on('mouseover', function(){
      const lbl = labelMarkers[name];
      if (!labelLayer.hasLayer(lbl)) labelLayer.addLayer(lbl);
      lbl.setZIndexOffset(1000);
    });
    marker.on('mouseout', function(){
      const info = markerInfo[name];
      if (info && info.alwaysLabel) return;
      const lbl = labelMarkers[name];
      if (labelLayer.hasLayer(lbl)) labelLayer.removeLayer(lbl);
    });
    marker.on('popupopen', function() {
      this.setPopupContent(renderPopup(name));
      showLandmarks(name);
      // Bind click AFTER content is set (map.on popupopen fires earlier)
      setTimeout(() => {
        const el = this.getPopup().getElement();
        if (!el) return;
        el.querySelectorAll('[data-setorigin]').forEach(btn => {
          btn.onclick = (ev) => {
            ev.preventDefault(); ev.stopPropagation();
            const n = btn.getAttribute('data-setorigin');
            map.closePopup();
            setOrigin(n);
          };
        });
      }, 0);
    });
    marker.on('popupclose', clearLandmarks);
    marker.addTo(stationLayer);
    stationMarkers[name] = marker;

    // High-pane twin marker for origin/terminus/interchange states
    const highMarker = L.marker([s.lat, s.lng], {
      pane: 'highStations',
      interactive: false,
      icon: L.divIcon({ className: 'stn-marker', html: '', iconSize: [22,22], iconAnchor: [11,11] })
    }).addTo(stationLayer);
    highMarkers = window._krlHighMarkers = window._krlHighMarkers || {};
    highMarkers[name] = highMarker;

    const label = L.marker([s.lat, s.lng], {
      icon: L.divIcon({
        className: 'stn-label',
        html: `<div style="padding-left:10px;">${name}</div>`,
        iconSize: [null, 16], iconAnchor: [-6, 8]
      }),
      interactive: false
    });
    labelMarkers[name] = label;
  });

  // Global delegation fallback — catches clicks even if the marker-level binder misses
  document.addEventListener('click', (ev) => {
    const btn = ev.target.closest && ev.target.closest('[data-setorigin]');
    if (!btn) return;
    ev.preventDefault(); ev.stopPropagation();
    const n = btn.getAttribute('data-setorigin');
    map.closePopup();
    setOrigin(n);
  }, true);

  function showLandmarks(stationName) {
    clearLandmarks();
    const lms = LANDMARKS[stationName] || [];
    lms.forEach(lm => {
      L.marker([lm.lat, lm.lng], {
        icon: L.divIcon({
          className: 'stn-marker',
          html: '<div class="landmark-dot"></div>',
          iconSize: [14,14], iconAnchor: [7,7]
        }),
        interactive: false
      }).addTo(landmarkLayer);
      L.marker([lm.lat, lm.lng], {
        icon: L.divIcon({
          className: 'landmark-label',
          html: `<div style="padding-left:10px;">${lm.name}</div>`,
          iconSize: [null, 14], iconAnchor: [-7, 7]
        }),
        interactive: false
      }).addTo(landmarkLayer);
    });
  }
  function clearLandmarks() { landmarkLayer.clearLayers(); }

  // ---- State ----
  let origin = 'Rawa Buntu';
  let currentDist = computeTimes(origin);

  const slider = document.getElementById('time-slider');
  const chip = document.getElementById('time-chip');
  const originNameEl = document.getElementById('origin-name');
  // (old stat refs removed — new stat elements accessed directly in render)
  const playBtn = document.getElementById('play');
  const playIcon = document.getElementById('play-icon');
  const resetBtn = document.getElementById('reset');
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');


  function updateChip() {
    const min = parseInt(slider.value, 10);
    const max = parseInt(slider.max, 10);
    const minV = parseInt(slider.min, 10);
    const pct = ((min - minV) / (max - minV)) * 100;
    chip.textContent = fmtTime(min);
    chip.style.left = `calc(${pct}% + 8px)`;
    slider.style.setProperty('--pct', pct + '%');
  }

  // ---- Blob merging ----
  let BLOB_RADIUS_KM = 4.0;
  const CIRCLE_STEPS = 48;
  let stationCirclePoly = {};
  function rebuildCircles() {
    stationCirclePoly = {};
    Object.entries(STATIONS).forEach(([name, s]) => {
      stationCirclePoly[name] = turf.circle(
        [s.lng, s.lat], BLOB_RADIUS_KM,
        { steps: CIRCLE_STEPS, units: 'kilometers' }
      );
    });
  }
  rebuildCircles();

  function buildBlobFeature(stationNames) {
    if (!stationNames.length) return null;
    let merged = stationCirclePoly[stationNames[0]];
    for (let i = 1; i < stationNames.length; i++) {
      try { merged = turf.union(merged, stationCirclePoly[stationNames[i]]); }
      catch (err) {}
    }
    return merged;
  }

  // ---- Gradient blob renderer (canvas overlay, merges smoothly) ----
  // Draws a radial gradient per reachable station onto a canvas using
  // 'lighten' composite mode, so overlaps merge to the max alpha instead
  // of stacking (which would darken). Result: continuous soft blob that
  // fades from ~20% opacity at station centers to ~3% at the edge.
  const gradientCanvasLayer = L.layerGroup().addTo(map);
  let _gradCanvas = null;

  function ensureCanvas() {
    if (_gradCanvas && _gradCanvas._map) return _gradCanvas;
    const CanvasOverlay = L.Layer.extend({
      onAdd: function(m) {
        const c = L.DomUtil.create('canvas', 'leaflet-zoom-animated');
        c.style.pointerEvents = 'none';
        c.style.position = 'absolute';
        m.getPanes().overlayPane.appendChild(c);
        this._canvas = c;
        m.on('moveend zoomend resize viewreset zoomanim', this._reset, this);
        this._reset();
      },
      onRemove: function(m) {
        if (this._canvas && this._canvas.parentNode) this._canvas.parentNode.removeChild(this._canvas);
        m.off('moveend zoomend resize viewreset zoomanim', this._reset, this);
      },
      _reset: function() {
        const size = this._map.getSize();
        const topLeft = this._map.containerPointToLayerPoint([0, 0]);
        L.DomUtil.setPosition(this._canvas, topLeft);
        const dpr = window.devicePixelRatio || 1;
        this._canvas.width = size.x * dpr;
        this._canvas.height = size.y * dpr;
        this._canvas.style.width = size.x + 'px';
        this._canvas.style.height = size.y + 'px';
        this._dpr = dpr;
        if (this._draw) this._draw();
      },
      setDraw: function(fn) { this._draw = fn; if (this._canvas) fn(); },
      redraw: function() { if (this._draw) this._draw(); }
    });
    _gradCanvas = new CanvasOverlay();
    _gradCanvas.addTo(map);
    return _gradCanvas;
  }
  const overlay = ensureCanvas();
  map.on('move zoom', () => overlay._reset && overlay._reset());

  function renderBlob(stationNames) {
    blobLayer.clearLayers();
    overlay.setDraw(() => {
      const c = overlay._canvas;
      if (!c) return;
      const ctx = c.getContext('2d');
      const dpr = overlay._dpr || 1;
      const W = c.width, H = c.height;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, W, H);
      ctx.scale(dpr, dpr);
      const cssW = W / dpr, cssH = H / dpr;

      // km-to-px helper at a reference latitude
      function kmToPx(refLat, km) {
        const p0 = map.latLngToContainerPoint([refLat, 0]);
        const p1 = map.latLngToContainerPoint([refLat, km / (111.32 * Math.cos(refLat * Math.PI / 180))]);
        return Math.max(4, Math.hypot(p1.x - p0.x, p1.y - p0.y));
      }

      // ── TRUE METABALL MERGE via offscreen canvas ──────────────────────────
      // Strategy: paint all blobs onto an offscreen canvas using 'source-over'
      // but with 'lighter' blending mode replaced by a smarter approach:
      // 1. Draw each blob as pure alpha (white on transparent) to an alpha-only buffer
      //    using 'lighten' so overlapping alphas take the MAX not SUM.
      // 2. Tint the result with the fill color at a single flat opacity.
      // This gives Chronotrains-style merging: overlaps don't stack darker.
      // ─────────────────────────────────────────────────────────────────────
      const off = document.createElement('canvas');
      off.width = W; off.height = H;
      const octx = off.getContext('2d');
      octx.scale(dpr, dpr);

      if (mode === 'car') {
        if (!stationNames.length) return;
        const budget = parseInt(slider.value, 10);
        if (budget <= 0) return;
        const o = STATIONS[origin];
        const km = (28 / 60) * budget;
        const pxR = kmToPx(o.lat, km);
        const p = map.latLngToContainerPoint([o.lat, o.lng]);

        // Draw alpha shape to offscreen
        octx.globalCompositeOperation = 'source-over';
        const grad = octx.createRadialGradient(p.x, p.y, 0, p.x, p.y, pxR);
        grad.addColorStop(0.00, 'rgba(255,255,255,0.95)');
        grad.addColorStop(0.80, 'rgba(255,255,255,0.90)');
        grad.addColorStop(0.95, 'rgba(255,255,255,0.50)');
        grad.addColorStop(1.00, 'rgba(255,255,255,0.00)');
        octx.fillStyle = grad;
        octx.beginPath(); octx.arc(p.x, p.y, pxR, 0, Math.PI * 2); octx.fill();

        // Tint: multiply alpha channel with the fill color
        octx.globalCompositeOperation = 'source-in';
        octx.fillStyle = 'rgba(16,185,129,0.38)';
        octx.fillRect(0, 0, cssW, cssH);

        // Stamp onto main canvas
        ctx.globalCompositeOperation = 'source-over';
        ctx.drawImage(off, 0, 0, cssW, cssH);

        // Solid outline ring
        ctx.strokeStyle = 'rgba(5,150,105,0.40)';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(p.x, p.y, pxR, 0, Math.PI * 2); ctx.stroke();
        return;
      }

      // ── Transun mode ──────────────────────────────────────────────────────
      if (!stationNames.length) return;
      const refLat = STATIONS[stationNames[0]].lat;
      const pxR = kmToPx(refLat, BLOB_RADIUS_KM);

      // Step 1: paint all blobs onto offscreen with 'lighten' (max-alpha merge)
      octx.globalCompositeOperation = 'source-over';
      for (const name of stationNames) {
        const s = STATIONS[name];
        const p = map.latLngToContainerPoint([s.lat, s.lng]);
        // Each blob: white circle fading to transparent. 'lighten' = max(a1,a2) not sum.
        octx.globalCompositeOperation = 'lighten';
        const grad = octx.createRadialGradient(p.x, p.y, 0, p.x, p.y, pxR);
        grad.addColorStop(0.00, 'rgba(255,255,255,0.95)');
        grad.addColorStop(0.75, 'rgba(255,255,255,0.90)');
        grad.addColorStop(0.93, 'rgba(255,255,255,0.50)');
        grad.addColorStop(1.00, 'rgba(255,255,255,0.00)');
        octx.fillStyle = grad;
        octx.beginPath(); octx.arc(p.x, p.y, pxR, 0, Math.PI * 2); octx.fill();
      }

      // Step 2: tint the merged alpha mask with the fill color
      octx.globalCompositeOperation = 'source-in';
      octx.fillStyle = 'rgba(16,185,129,0.38)';
      octx.fillRect(0, 0, cssW, cssH);

      // Step 3: stamp onto main canvas
      ctx.globalCompositeOperation = 'source-over';
      ctx.drawImage(off, 0, 0, cssW, cssH);
    });

    // Merged outline for Transun mode
    if (mode === 'krl' && stationNames.length) {
      let merged = null;
      for (const name of stationNames) {
        const s = STATIONS[name];
        const circ = turf.circle([s.lng, s.lat], BLOB_RADIUS_KM, { steps: 40, units: 'kilometers' });
        if (!merged) merged = circ;
        else { try { merged = turf.union(merged, circ); } catch(e) {} }
      }
      if (merged) {
        L.geoJSON(merged, {
          interactive: false,
          style: {
            color: '#059669', weight: 1.2, opacity: 0.40,
            fillOpacity: 0, lineJoin: 'round', lineCap: 'round'
          }
        }).addTo(blobLayer);
      }
    }
  }

  function render() {
    const budget = parseInt(slider.value, 10);
    const termini = findTermini(currentDist, budget, origin);

    edgeLines.forEach(edge => {
      if (mode === 'car') {
        // In car mode, hide rail lines — they're irrelevant
        edge.shadow.setStyle({ opacity: 0 });
        edge.poly.setStyle({ opacity: 0 });
        return;
      }
      const ta = currentDist[edge.a];
      const tb = currentDist[edge.b];
      if (ta <= budget && tb <= budget) {
        edge.shadow.setStyle({ color: 'rgba(16,185,129,0.30)', weight: 5, opacity: 1 });
        edge.poly.setStyle({ color: '#059669', weight: 2.2, opacity: 0.95 });
      } else {
        edge.shadow.setStyle({ opacity: 0 });
        edge.poly.setStyle({ opacity: 0 });
      }
    });

    const blobStations = [];
    const reachable = [];
    Object.entries(STATIONS).forEach(([name, s]) => {
      const t = currentDist[name];
      const isOrigin = name === origin;
      if (isOrigin || (t <= budget && isFinite(t))) {
        blobStations.push(name);
        if (!isOrigin) reachable.push(name);
      }
    });

    renderBlob(blobStations);

    Object.entries(STATIONS).forEach(([name, s]) => {
      const isOrigin = name === origin;
      const isTerminus = termini.has(name);
      const isReachable = isFinite(currentDist[name]) && currentDist[name] <= budget;
      let cls, size, alwaysLabel = false, labelClass = '';
      // A station is an interchange only if its reachable edges span 2+ distinct
      // lines — meaning you'd actually need to change trains there right now.
      const reachableEdgeLines = adj[name]
        .filter(e => isFinite(currentDist[e.to]) && currentDist[e.to] <= budget)
        .map(e => e.line);
      const isInterchange = isReachable && new Set(reachableEdgeLines).size > 1;

      if (mode === 'car') {
        // Car mode: only show origin station
        if (isOrigin) { cls = 'stn-dot origin'; size = 22; alwaysLabel = true; labelClass = 'origin'; }
        else { cls = 'stn-dot hidden-hit'; size = 22; }
      } else {
        if (isOrigin) { cls = 'stn-dot origin'; size = 22; alwaysLabel = true; labelClass = 'origin'; }
        else if (isTerminus) { cls = 'stn-dot terminus'; size = 22; /* no alwaysLabel — hover only */ }
        else if (isInterchange && isReachable) { cls = 'stn-dot interchange'; size = 22; }
        else if (isReachable) { cls = 'stn-dot reachable-small'; size = 22; }
        else { cls = 'stn-dot hidden-hit'; size = 22; } // hidden when not reachable
      }

      const showHighPane = isOrigin || (mode !== 'car' && (isTerminus || (isInterchange && isReachable)));
      // For regular reachable small dots, render directly (not via highPane)
      const isSmallReachable = !showHighPane && isReachable && mode !== 'car';
      stationMarkers[name].setIcon(L.divIcon({
        className: 'stn-marker',
        html: showHighPane
          ? '<div class="stn-dot hidden-hit"></div>'
          : isSmallReachable
            ? `<div class="${cls}" style="margin:8px auto;"></div>`
            : `<div class="${cls}" style="margin:${(22 - 5)/2}px auto;"></div>`,
        iconSize: [size, size], iconAnchor: [size/2, size/2]
      }));
      // Paint highlight on the high-pane marker for origin/terminus/interchange
      const highHtml = showHighPane
        ? `<div class="${cls}" style="margin:${(22 - (isOrigin?16:isTerminus?10:10))/2}px auto;"></div>`
        : '';
      if (highMarkers[name]) {
        highMarkers[name].setIcon(L.divIcon({ className: 'stn-marker', html: highHtml, iconSize: [22,22], iconAnchor: [11,11] }));
      }
      markerInfo[name] = { alwaysLabel };

      const existingLbl = labelMarkers[name];
      if (labelLayer.hasLayer(existingLbl)) labelLayer.removeLayer(existingLbl);
      if (alwaysLabel) {
        const newLabel = L.marker([s.lat, s.lng], {
          icon: L.divIcon({
            className: `stn-label ${labelClass}`,
            html: `<div style="padding-left:${isOrigin?14:11}px;">${name}</div>`,
            iconSize: [null, 16], iconAnchor: [-6, 8]
          }),
          interactive: false
        });
        labelMarkers[name] = newLabel;
        labelLayer.addLayer(newLabel);
      }
    });

    // ── Numbers panel ────────────────────────────────────────────────────
    const JKT_BDG_KM = 153;
    const totalLandmarks = Object.values(LANDMARKS).reduce((s, arr) => s + arr.length, 0);

    function countReachableLandmarks(distMap, bdg) {
      let count = 0;
      Object.entries(LANDMARKS).forEach(([stn, lms]) => {
        const t = distMap[stn];
        if (stn === origin || (isFinite(t) && t <= bdg)) count += lms.length;
      });
      return count;
    }
    function farthestKm(distMap, bdg) {
      const o = STATIONS[origin];
      let maxKm = 0;
      allStations.forEach(name => {
        if (name === origin) return;
        const t = distMap[name];
        if (!isFinite(t) || t > bdg) return;
        const km = turf.distance([o.lng, o.lat], [STATIONS[name].lng, STATIONS[name].lat], { units: 'kilometers' });
        if (km > maxKm) maxKm = km;
      });
      return maxKm;
    }

    document.getElementById('stat-lm-total').textContent = totalLandmarks;

    // Always compute KRL values for comparison
    const krlDist     = (mode === 'krl') ? currentDist : computeTimes(origin);
    const krlKm       = farthestKm(krlDist, budget);
    const krlDistPct  = Math.min(100, Math.round(krlKm / JKT_BDG_KM * 100));
    const krlLmCount  = countReachableLandmarks(krlDist, budget);
    const krlLmPct    = totalLandmarks ? Math.round(krlLmCount / totalLandmarks * 100) : 0;

    const distBlock = document.getElementById('stat-distance');
    const lmBlock   = document.getElementById('stat-landmarks');

    if (mode === 'car') {
      const carKm      = (28 / 60) * budget;
      const carDistPct = Math.min(100, Math.round(carKm / JKT_BDG_KM * 100));
      const carLmCount = countReachableLandmarks(currentDist, budget);
      const carLmPct   = totalLandmarks ? Math.round(carLmCount / totalLandmarks * 100) : 0;

      // Orange theme for car mode
      distBlock.className = 'stat-block stat-theme-orange';
      lmBlock.className   = 'stat-block stat-theme-orange';

      // Dist: show car number, orange bar on top, green (transun) below
      document.getElementById('stat-dist-val').textContent  = Math.round(carKm);
      document.getElementById('stat-dist-pct').textContent  = carDistPct;
      document.getElementById('bar-dist-orange').style.width = carDistPct + '%';
      document.getElementById('bar-dist-green').style.width  = krlDistPct + '%';
      document.getElementById('bar-dist-orange-track').classList.add('visible');

      // Landmarks: show car number, orange on top, green below
      document.getElementById('stat-lm-val').textContent    = carLmPct;
      document.getElementById('stat-lm-count').textContent  = carLmCount;
      document.getElementById('bar-lm-orange').style.width  = carLmPct + '%';
      document.getElementById('bar-lm-green').style.width   = krlLmPct + '%';
      document.getElementById('bar-lm-orange-track').classList.add('visible');

    } else {
      // Green theme for Transun mode; orange bar hidden (width 0)
      distBlock.className = 'stat-block stat-theme-green';
      lmBlock.className   = 'stat-block stat-theme-green';

      document.getElementById('stat-dist-val').textContent  = Math.round(krlKm);
      document.getElementById('stat-dist-pct').textContent  = krlDistPct;
      document.getElementById('bar-dist-green').style.width  = krlDistPct + '%';
      document.getElementById('bar-dist-orange').style.width = '0%';
      document.getElementById('bar-dist-orange-track').classList.remove('visible');

      document.getElementById('stat-lm-val').textContent    = krlLmPct;
      document.getElementById('stat-lm-count').textContent  = krlLmCount;
      document.getElementById('bar-lm-green').style.width   = krlLmPct + '%';
      document.getElementById('bar-lm-orange').style.width  = '0%';
      document.getElementById('bar-lm-orange-track').classList.remove('visible');
    }
  }

  function setOrigin(name) {
    if (!STATIONS[name]) return;
    origin = name;
    originNameEl.textContent = name;
    recomputeDist();
    map.panTo([STATIONS[name].lat, STATIONS[name].lng], { animate: true, duration: 0.6 });
    render();
    hideSearch();
    searchInput.value = '';
  }

  slider.addEventListener('input', () => { stopPlay(); updateChip(); render(); });

  let playState = 'stopped', rafId = null, playStartTime = 0;
  const PLAY_DURATION_MS = 12000;
  function setPlayIcon(playing) {
    if (playing) {
      playIcon.innerHTML = '<rect x="3" y="2" width="3" height="10" fill="currentColor"/><rect x="8" y="2" width="3" height="10" fill="currentColor"/>';
      playBtn.classList.add('active');
    } else {
      playIcon.innerHTML = '<polygon points="3,2 12,7 3,12" fill="currentColor"/>';
      playBtn.classList.remove('active');
    }
  }
  function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
  function playLoop(now) {
    const elapsed = now - playStartTime;
    const t = Math.min(1, elapsed / PLAY_DURATION_MS);
    const eased = easeInOutCubic(t);
    const minV = parseInt(slider.min, 10), maxV = parseInt(slider.max, 10);
    slider.value = Math.round(minV + eased * (maxV - minV));
    updateChip(); render();
    if (t < 1) rafId = requestAnimationFrame(playLoop);
    else stopPlay();
  }
  function startPlay() {
    playState = 'playing'; setPlayIcon(true);
    slider.value = slider.min; updateChip(); render();
    playStartTime = performance.now();
    rafId = requestAnimationFrame(playLoop);
  }
  function stopPlay() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    playState = 'stopped'; setPlayIcon(false);
  }
  playBtn.addEventListener('click', () => { if (playState==='playing') stopPlay(); else startPlay(); });
  resetBtn.addEventListener('click', () => { stopPlay(); slider.value = 30; updateChip(); render(); });

  // ---- Search ----
  let selectedIdx = -1;
  function highlightMatch(text, q) {
    if (!q) return text;
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx === -1) return text;
    return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + q.length) + '</mark>' + text.slice(idx + q.length);
  }
  function renderSearchResults(filter) {
    const q = filter.trim().toLowerCase();
    let results;
    if (!q) results = allStations.slice().sort();
    else results = allStations.filter(s => s.toLowerCase().includes(q))
      .sort((a, b) => {
        const ai = a.toLowerCase().indexOf(q);
        const bi = b.toLowerCase().indexOf(q);
        if (ai !== bi) return ai - bi;
        return a.localeCompare(b);
      });
    selectedIdx = results.length > 0 ? 0 : -1;
    if (results.length === 0) {
      searchResults.innerHTML = '<div class="search-row" style="color:#98a1b3;cursor:default;">No stations match</div>';
      searchResults.style.display = 'block';
      return;
    }
    searchResults.innerHTML = results.slice(0, 60).map((name, i) => {
      const lineDots = STATIONS[name].lines.map(l =>
        `<span style="background:${LINE_COLORS[l]};" title="${LINE_NAMES[l]}"></span>`
      ).join('');
      const linesLabel = STATIONS[name].lines.map(l => LINE_NAMES[l].slice(0,3)).join(' · ');
      return `<div class="search-row${i===selectedIdx?' active':''}" data-name="${name}" data-idx="${i}">
        <span class="stn-name">${highlightMatch(name, q)}</span>
        <span class="meta-r">
          <span class="lines-label">${linesLabel}</span>
          <span class="line-dots">${lineDots}</span>
        </span></div>`;
    }).join('');
    searchResults.style.display = 'block';
    searchResults.querySelectorAll('.search-row[data-name]').forEach(el => {
      el.addEventListener('mousedown', (e) => { e.preventDefault(); setOrigin(el.dataset.name); });
      el.addEventListener('mouseenter', () => {
        selectedIdx = parseInt(el.dataset.idx, 10);
        searchResults.querySelectorAll('.search-row').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
      });
    });
  }
  function hideSearch() { searchResults.style.display = 'none'; }
  searchInput.addEventListener('focus', () => renderSearchResults(searchInput.value));
  searchInput.addEventListener('input', () => renderSearchResults(searchInput.value));
  searchInput.addEventListener('blur', () => { setTimeout(hideSearch, 150); });
  searchInput.addEventListener('keydown', (e) => {
    if (searchResults.style.display !== 'block') return;
    const rows = searchResults.querySelectorAll('.search-row[data-name]');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      selectedIdx = Math.min(selectedIdx + 1, rows.length - 1);
      rows.forEach((r, i) => r.classList.toggle('active', i === selectedIdx));
      if (rows[selectedIdx]) rows[selectedIdx].scrollIntoView({block: 'nearest'});
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      selectedIdx = Math.max(selectedIdx - 1, 0);
      rows.forEach((r, i) => r.classList.toggle('active', i === selectedIdx));
      if (rows[selectedIdx]) rows[selectedIdx].scrollIntoView({block: 'nearest'});
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (rows[selectedIdx]) setOrigin(rows[selectedIdx].dataset.name);
    } else if (e.key === 'Escape') { hideSearch(); searchInput.blur(); }
  });
  document.addEventListener('mousedown', (e) => {
    if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) hideSearch();
  });

  const bounds = L.latLngBounds(Object.values(STATIONS).map(s => [s.lat, s.lng]));
  map.fitBounds(bounds, { padding: [120, 80], paddingTopLeft: [80, 140] });

  // ---- Mode (krl | car) ----
  let mode = 'krl';
  // Car reachable time: crow-fly km / avg 30 km/h -> minutes, rounded up to 5
  function computeCarTimes(originName) {
    const dist = {};
    const o = STATIONS[originName];
    allStations.forEach(name => {
      if (name === originName) { dist[name] = 0; return; }
      const s = STATIONS[name];
      const km = turf.distance([o.lng, o.lat], [s.lng, s.lat], { units: 'kilometers' });
      const minRaw = (km / 28) * 60; // 28 km/h avg urban
      dist[name] = Math.max(5, Math.ceil(minRaw / 5) * 5);
    });
    return dist;
  }
  function recomputeDist() {
    currentDist = (mode === 'car') ? computeCarTimes(origin) : computeTimes(origin);
  }

  const modeKrlBtn = document.getElementById('mode-krl');
  const modeCarBtn = document.getElementById('mode-car');
  const modeLabel = document.getElementById('mode-label');
  function setMode(m) {
    if (mode === m) return;
    mode = m;
    modeKrlBtn.classList.toggle('active', m === 'krl');
    modeCarBtn.classList.toggle('active', m === 'car');
    modeLabel.textContent = m === 'car' ? 'Mobil' : 'Transun';
    recomputeDist();
    render();
  }
  modeKrlBtn.addEventListener('click', () => setMode('krl'));
  modeCarBtn.addEventListener('click', () => setMode('car'));

  // Radius slider wiring
  const radiusSlider = document.getElementById('radius-slider');
  const radiusVal = document.getElementById('radius-val');
  radiusSlider.addEventListener('input', () => {
    BLOB_RADIUS_KM = parseFloat(radiusSlider.value);
    radiusVal.textContent = BLOB_RADIUS_KM.toFixed(1);
    rebuildCircles();
    render();
  });

  updateChip();
  render();
})();
</script>
</body>
</html>
